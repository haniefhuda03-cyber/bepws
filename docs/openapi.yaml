        '401':
          description: X-APP-KEY tidak ada atau tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /console:
    post:
      tags: [Console]
      summary: Terima data console (POST)
      description: |
        Endpoint untuk menerima data cuaca dari perangkat console station.
        
        **Keamanan**: IP Whitelist only (env `CONSOLE_IP_WHITELIST`).
        Console endpoint berjalan di port yang sama dengan Flask API (5000).
        
        Data disimpan dalam **Imperial units** sesuai format yang dikirim device.
      operationId: postConsoleData
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - tempf
                - humidity
                - winddir
                - baromrelin
              properties:
                tempf:
                  type: number
                  description: Suhu (°F)
                  example: 82.4
                humidity:
                  type: number
                  description: Kelembaban (%)
                  example: 75.0
                winddir:
                  type: number
                  description: Arah angin (°)
                  example: 180
                baromrelin:
                  type: number
                  description: Tekanan barometrik relatif (inHg)
                  example: 29.92
                windspeedmph:
                  type: number
                  description: Kecepatan angin (mph)
                  example: 5.0
                solarradiation:
                  type: number
                  description: Radiasi matahari (W/m²)
                  example: 100.5
                rainratein:
                  type: number
                  description: Intensitas hujan (in/hr)
                  example: 0.0
                dateutc:
                  type: string
                  description: "Timestamp UTC (format: YYYY-MM-DD HH:MM:SS)"
                  example: "2026-02-24 03:00:00"
      responses:
        '201':
          description: Data berhasil disimpan
          content:
            application/json:
              example:
                meta:
                  status: success
                  code: 201
                  timestamp: "2026-02-24T03:00:00.000000+00:00"
                data:
                  id: 3
                  timestamp: "2026-02-24T03:00:00.000000+00:00"
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: ID record yang tersimpan
                      timestamp:
                        type: string
                        format: date-time
        '400':
          description: Data tidak valid atau tidak lengkap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                meta:
                  status: error
                  code: 400
                  timestamp: "2026-02-24T03:00:00.000000+00:00"
                error:
                  code: MISSING_FIELD
                  message: "Required fields missing: tempf, humidity"
                data: null
    get:
      tags: [Console]
      summary: Terima data console (GET)
      description: |
        Alternatif GET method untuk menerima data console. Sama seperti POST.
        
        Beberapa weather station device mengirim data via GET query string.
        **Keamanan**: IP Whitelist only (env `CONSOLE_IP_WHITELIST`).
      operationId: getConsoleData
      parameters:
        - name: tempf
          in: query
          required: true
          schema:
            type: number
          description: Suhu (°F)
        - name: humidity
          in: query
          required: true
          schema:
            type: number
          description: Kelembaban (%)
        - name: winddir
          in: query
          required: true
          schema:
            type: number
          description: Arah angin (°)
        - name: baromrelin
          in: query
          required: true
          schema:
            type: number
          description: Tekanan barometrik (inHg)
      responses:
        '201':
          description: Data berhasil disimpan
        '400':
          description: Data tidak valid atau tidak lengkap
